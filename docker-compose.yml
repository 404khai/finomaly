# Real-time fraud detection infrastructure.
# Redpanda is a Kafka-API-compatible broker (no Zookeeper needed) and Redis
# caches the precomputed GNN node embeddings for sub-ms lookups.
#
# Usage:
#   docker compose up -d
#   docker compose ps                # wait for "healthy"
#   docker compose logs -f redpanda
#   docker compose down              # add -v to wipe persisted data

name: finomaly

networks:
  finomaly:
    driver: bridge

volumes:
  redpanda-data:
  redis-data:

services:
  # -------------------------------------------------------------------
  # Redpanda — single-node Kafka broker (Kafka API on :9092).
  # rpk is used inside the healthcheck to verify the broker is ready.
  # -------------------------------------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: finomaly-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
      - --smp=1
      - --memory=1G
      - --mode=dev-container
      - --set redpanda.auto_create_topics_enabled=true
    ports:
      - "19092:19092"   # Kafka API (host -> container). Apps use localhost:19092
      - "18082:18082"   # PandaProxy (REST)
      - "18081:18081"   # Schema registry
      - "19644:9644"    # Prometheus metrics
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - finomaly
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy: *true' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  # -------------------------------------------------------------------
  # Redpanda Console — web UI for browsing topics/messages.
  # http://localhost:8080
  # -------------------------------------------------------------------
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: finomaly-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    ports:
      - "8080:8080"
    networks:
      - finomaly

  # -------------------------------------------------------------------
  # Redis — caches GNN node embeddings keyed by user id.
  # Embeddings are pushed in Phase 3 and looked up per-transaction in Phase 4.
  # -------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: finomaly-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - finomaly
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
